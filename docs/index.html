<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Report 动态镜像站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .last-update {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .section-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .date-list {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .date-btn {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: bold;
        }
        
        .date-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .date-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-color: transparent;
        }
        
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }
        
        .file-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            border-color: rgba(0, 212, 255, 0.5);
        }
        
        .file-item .icon {
            font-size: 24px;
            margin-right: 15px;
        }
        
        .file-item .name {
            flex: 1;
            font-size: 15px;
        }
        
        .file-item .size {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .iframe-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            min-height: 600px;
        }
        
        .iframe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .iframe-title {
            font-size: 16px;
            color: #00d4ff;
        }
        
        .close-iframe {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
        }
        
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 8px;
            background: #fff;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #ff6b6b;
        }
        
        .refresh-btn {
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 6px;
            color: #00d4ff;
            cursor: pointer;
            font-size: 12px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Finance Report 动态镜像站</h1>
        <div>
            <span class="last-update" id="lastUpdate">最后更新: --</span>
            <button class="refresh-btn" onclick="init()" style="margin-left: 15px;">🔄 刷新</button>
        </div>
    </div>
    
    <div class="container">
        <h2 class="section-title">📁 选择日期目录</h2>
        <div class="date-list" id="dateList">
            <div class="loading">加载日期目录...</div>
        </div>
        
        <h2 class="section-title" id="fileSectionTitle">📄 当前目录文件</h2>
        <div class="file-list" id="fileList">
            <div class="loading">请先选择日期目录</div>
        </div>
        
        <div class="iframe-container hidden" id="iframeContainer">
            <div class="iframe-header">
                <span class="iframe-title" id="iframeTitle">文件内容</span>
                <button class="close-iframe" onclick="closeIframe()">✕ 关闭</button>
            </div>
            <iframe id="contentFrame" src=""></iframe>
        </div>
    </div>
    
    <script>
        const OWNER = 'zhanghtgm-blip';
        const REPO = 'finance';
        const BASE_PATH = 'report';
        
        let cachedDates = null;
        let cachedFiles = {};
        let currentDate = '';
        
        const countryIcons = {
            'Europe': '🌍',
            'Belgium': '🇧🇪',
            'Finland': '🇫🇮',
            'France': '🇫🇷',
            'Germany': '🇩🇪',
            'Ireland': '🇮🇪',
            'Israel': '🇮🇱',
            'Italy': '🇮🇹',
            'Poland': '🇵🇱',
            'Sweden': '🇸🇪',
            'Switzerland': '🇨🇭',
            'index': '📋'
        };
        
        document.addEventListener('DOMContentLoaded', init);
        
        async function init() {
            await loadDates();
        }
        
        async function loadDates() {
            const dateList = document.getElementById('dateList');
            dateList.innerHTML = '<div class="loading">加载日期目录...</div>';
            
            if (cachedDates) {
                renderDates(cachedDates);
                return;
            }
            
            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                cachedDates = data;
                renderDates(data);
                updateLastUpdate();
            } catch (error) {
                dateList.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }
        
        function renderDates(dates) {
            const dateList = document.getElementById('dateList');
            dateList.innerHTML = '';
            
            if (!Array.isArray(dates) || dates.length === 0) {
                dateList.innerHTML = '<div class="loading">暂无日期目录</div>';
                return;
            }
            
            const sortedDates = dates.filter(d => d.type === 'dir').sort((a, b) => b.name.localeCompare(a.name));
            
            sortedDates.forEach(dateDir => {
                const btn = document.createElement('button');
                btn.className = 'date-btn';
                btn.textContent = dateDir.name;
                btn.onclick = () => selectDate(dateDir.name);
                dateList.appendChild(btn);
            });
            
            if (sortedDates.length > 0 && !currentDate) {
                selectDate(sortedDates[0].name);
            }
        }
        
        async function selectDate(dateName) {
            currentDate = dateName;
            
            document.querySelectorAll('.date-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === dateName);
            });
            
            document.getElementById('fileSectionTitle').textContent = `📄 ${dateName} 目录文件`;
            
            await loadFiles(dateName);
        }
        
        async function loadFiles(dateName) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '<div class="loading">加载文件列表...</div>';
            
            const cacheKey = `${dateName}`;
            if (cachedFiles[cacheKey]) {
                renderFiles(cachedFiles[cacheKey]);
                return;
            }
            
            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}/${dateName}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                cachedFiles[cacheKey] = data;
                renderFiles(data);
            } catch (error) {
                fileList.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }
        
        function renderFiles(files) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            
            if (!Array.isArray(files) || files.length === 0) {
                fileList.innerHTML = '<div class="loading">暂无文件</div>';
                return;
            }
            
            const sortedFiles = files.filter(f => f.type === 'file' && f.name.endsWith('.html'))
                .sort((a, b) => {
                    if (a.name === 'index.html') return -1;
                    if (b.name === 'index.html') return 1;
                    return a.name.localeCompare(b.name);
                });
            
            sortedFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                
                const nameWithoutExt = file.name.replace('.html', '');
                const icon = countryIcons[nameWithoutExt] || '📄';
                
                item.innerHTML = `
                    <span class="icon">${icon}</span>
                    <span class="name">${file.name}</span>
                    <span class="size">${(file.size / 1024).toFixed(1)} KB</span>
                `;
                item.onclick = () => openFile(file);
                fileList.appendChild(item);
            });
        }
        
        function openFile(file) {
            const iframeContainer = document.getElementById('iframeContainer');
            const contentFrame = document.getElementById('contentFrame');
            const iframeTitle = document.getElementById('iframeTitle');
            
            // 使用 raw.githubusercontent.com 直接加载 HTML 文件
            const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/master/${BASE_PATH}/${currentDate}/${file.name}`;
            
            contentFrame.src = rawUrl;
            iframeTitle.textContent = file.name;
            iframeContainer.classList.remove('hidden');
            
            // 滚动到 iframe 区域
            iframeContainer.scrollIntoView({ behavior: 'smooth' });
        }
        
        function closeIframe() {
            const iframeContainer = document.getElementById('iframeContainer');
            const contentFrame = document.getElementById('contentFrame');
            
            contentFrame.src = '';
            iframeContainer.classList.add('hidden');
        }
        
        function updateLastUpdate() {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            document.getElementById('lastUpdate').textContent = `最后更新: ${timeStr}`;
        }
    </script>
</body>
</html>
