<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Report 动态镜像站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .last-update {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .section-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .date-list {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .date-btn {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: bold;
        }
        
        .date-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .date-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-color: transparent;
        }
        
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }
        
        .file-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            border-color: rgba(0, 212, 255, 0.5);
        }
        
        .file-item:hover .icon {
            transform: scale(1.2);
        }
        
        .file-item .icon {
            font-size: 24px;
            margin-right: 15px;
            transition: transform 0.3s ease;
        }
        
        .file-item .name {
            flex: 1;
            font-size: 15px;
        }
        
        .file-item .size {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .content-container {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            min-height: 500px;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .content-title {
            font-size: 16px;
            color: #333;
        }
        
        .content-link {
            padding: 6px 12px;
            background: #00d4ff;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 12px;
        }
        
        .content-link:hover {
            background: #00aadd;
        }
        
        .close-content {
            padding: 6px 12px;
            background: #f5f5f5;
            border: none;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .close-content:hover {
            background: #eee;
        }
        
        .content-header-buttons {
            display: flex;
        }
        
        .content-body {
            color: #333;
            line-height: 1.8;
            font-size: 14px;
            overflow-x: auto;
            max-height: 700px;
            overflow-y: auto;
        }
        
        .content-body h1, .content-body h2, .content-body h3 {
            color: #1a1a2e;
            margin: 20px 0 10px 0;
        }
        
        .content-body p {
            margin: 10px 0;
        }
        
        .content-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 13px;
        }
        
        .content-body th, .content-body td {
            padding: 8px 12px;
            border: 1px solid #ddd;
            text-align: left;
        }
        
        .content-body th {
            background: #f5f5f5;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #ff6b6b;
        }
        
        .error-dark {
            text-align: center;
            padding: 30px;
            color: #ff6b6b;
            background: #fff;
            border-radius: 8px;
        }
        
        .refresh-btn {
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 6px;
            color: #00d4ff;
            cursor: pointer;
            font-size: 12px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Finance Report 动态镜像站</h1>
        <div>
            <span class="last-update" id="lastUpdate">最后更新: --</span>
            <button class="refresh-btn" onclick="location.reload()" style="margin-left: 15px;">🔄 刷新</button>
        </div>
    </div>
    
    <div class="container">
        <h2 class="section-title">📁 选择日期目录</h2>
        <div class="date-list" id="dateList">
            <div class="loading">加载日期目录...</div>
        </div>
        
        <h2 class="section-title" id="fileSectionTitle">📄 当前目录文件</h2>
        <div class="file-list" id="fileList">
            <div class="loading">请先选择日期目录</div>
        </div>
        
        <div class="content-container hidden" id="contentContainer">
            <div class="content-header">
                <span class="content-title" id="contentTitle">文件内容</span>
                <div class="content-header-buttons">
                    <a class="content-link" id="contentLink" href="#" target="_blank" rel="noopener">在GitHub查看</a>
                    <button class="close-content" onclick="closeContent()">✕ 关闭</button>
                </div>
            </div>
            <div class="content-body" id="contentBody">
                <div class="loading" style="color: #999;">加载内容...</div>
            </div>
        </div>
    </div>
    
    <script>
        const OWNER = 'zhanghtgm-blip';
        const REPO = 'finance';
        const BASE_PATH = 'report';
        
        let cachedDates = null;
        let cachedFiles = {};
        let fileContents = {};
        let currentDate = '';
        let currentFile = null;
        
        const countryIcons = {
            'Europe': '🌍',
            'Belgium': '🇧🇪',
            'Finland': '🇫🇮',
            'France': '🇫🇷',
            'Germany': '🇩🇪',
            'Ireland': '🇮🇪',
            'Israel': '🇮🇱',
            'Italy': '🇮🇹',
            'Poland': '🇵🇱',
            'Sweden': '🇸🇪',
            'Switzerland': '🇨🇭',
            'index': '📋'
        };
        
        document.addEventListener('DOMContentLoaded', init);
        
        async function init() {
            await loadDates();
        }
        
        async function loadDates() {
            const dateList = document.getElementById('dateList');
            dateList.innerHTML = '<div class="loading">加载日期目录...</div>';
            
            if (cachedDates) {
                renderDates(cachedDates);
                return;
            }
            
            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                cachedDates = data;
                renderDates(data);
                updateLastUpdate();
            } catch (error) {
                dateList.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }
        
        function renderDates(dates) {
            const dateList = document.getElementById('dateList');
            dateList.innerHTML = '';
            
            if (!Array.isArray(dates) || dates.length === 0) {
                dateList.innerHTML = '<div class="loading">暂无日期目录</div>';
                return;
            }
            
            const sortedDates = dates.filter(d => d.type === 'dir').sort((a, b) => b.name.localeCompare(a.name));
            
            sortedDates.forEach(dateDir => {
                const btn = document.createElement('button');
                btn.className = 'date-btn';
                btn.textContent = dateDir.name;
                btn.onclick = () => selectDate(dateDir.name);
                dateList.appendChild(btn);
            });
            
            if (sortedDates.length > 0 && !currentDate) {
                selectDate(sortedDates[0].name);
            }
        }
        
        async function selectDate(dateName) {
            currentDate = dateName;
            
            document.querySelectorAll('.date-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === dateName);
            });
            
            document.getElementById('fileSectionTitle').textContent = `📄 ${dateName} 目录文件`;
            closeContent();
            
            await loadFiles(dateName);
        }
        
        async function loadFiles(dateName) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '<div class="loading">加载文件列表...</div>';
            
            const cacheKey = `${dateName}`;
            if (cachedFiles[cacheKey]) {
                renderFiles(cachedFiles[cacheKey]);
                return;
            }
            
            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}/${dateName}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                cachedFiles[cacheKey] = data;
                renderFiles(data);
            } catch (error) {
                fileList.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }
        
        function renderFiles(files) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            
            if (!Array.isArray(files) || files.length === 0) {
                fileList.innerHTML = '<div class="loading">暂无文件</div>';
                return;
            }
            
            const sortedFiles = files.filter(f => f.type === 'file' && f.name.endsWith('.html'))
                .sort((a, b) => {
                    if (a.name === 'index.html') return -1;
                    if (b.name === 'index.html') return 1;
                    return a.name.localeCompare(b.name);
                });
            
            sortedFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                
                const nameWithoutExt = file.name.replace('.html', '');
                const icon = countryIcons[nameWithoutExt] || '📄';
                
                item.innerHTML = `
                    <span class="icon">${icon}</span>
                    <span class="name">${file.name}</span>
                    <span class="size">${(file.size / 1024).toFixed(1)} KB</span>
                `;
                item.onclick = () => openFile(file);
                fileList.appendChild(item);
            });
        }
        
        async function openFile(file) {
            currentFile = file;
            const container = document.getElementById('contentContainer');
            const contentBody = document.getElementById('contentBody');
            const contentTitle = document.getElementById('contentTitle');
            const contentLink = document.getElementById('contentLink');
            
            contentTitle.textContent = file.name;
            contentLink.href = file.html_url;
            contentBody.innerHTML = '<div class="loading" style="color: #999;">加载内容...</div>';
            container.classList.remove('hidden');
            
            const cacheKey = `${currentDate}/${file.name}`;
            
            // 检查缓存
            if (fileContents[cacheKey]) {
                contentBody.innerHTML = fileContents[cacheKey];
                container.scrollIntoView({ behavior: 'smooth' });
                return;
            }
            
            try {
                // 使用 GitHub API 获取文件内容
                const apiUrl = file.url;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                // 解码 base64 内容
                const content = decodeURIComponent(encodeURIComponent(atob(data.content)));
                
                // 提取 body 内容
                let bodyContent = content;
                const bodyMatch = content.match(/<body[^>]*>([\s\S]*)<\/body>/i);
                if (bodyMatch) {
                    bodyContent = bodyMatch[1];
                }
                
                // 清理相对路径
                bodyContent = bodyContent.replace(/src="/g, 'src="https://raw.githubusercontent.com/zhanghtgm-blip/finance/master/');
                bodyContent = bodyContent.replace(/href="/g, 'href="https://github.com/zhanghtgm-blip/finance/blob/master/');
                
                fileContents[cacheKey] = bodyContent;
                contentBody.innerHTML = bodyContent;
                
                container.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                contentBody.innerHTML = `<div class="error-dark">加载失败: ${error.message}</div>`;
            }
        }
        
        function closeContent() {
            const container = document.getElementById('contentContainer');
            const contentBody = document.getElementById('contentBody');
            
            contentBody.innerHTML = '';
            container.classList.add('hidden');
            currentFile = null;
        }
        
        function updateLastUpdate() {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            document.getElementById('lastUpdate').textContent = `最后更新: ${timeStr}`;
        }
    </script>
</body>
</html>
