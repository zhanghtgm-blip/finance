<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法国财经周报 - 2026年5月31日</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; line-height: 1.8; color: #333; background: #f5f7fa; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #002395 0%, #ED2939 100%); color: white; padding: 40px 0; text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.2em; margin-bottom: 10px; }
        .summary-box { background: linear-gradient(135deg, #e7e7ff 0%, #fff 100%); border-left: 4px solid #002395; padding: 20px; margin-bottom: 30px; }
        .section { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .section-title { font-size: 1.4em; color: #002395; margin-bottom: 15px; }
        .metric { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .metric-label { color: #666; }
        .metric-value { font-weight: 700; }
        .footer { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🇫🇷 法国财经周报</h1>
            <p>2026年5月31日（第21周）</p>
        </div>
    </header>
    <div class="container">
        <div class="summary-box">
            <div class="summary-title">📊 周度总结</div>
            <p>法国是欧元区第二大经济体，2026年GDP预计增长1.2%。巴黎是金融与时尚中心，空客、路易威登等跨国企业总部所在地。核能、高速铁路技术领先。</p>
        </div>
        <div class="section">
            <div class="section-title">💰 财经基本面</div>
            <div class="metric"><span class="metric-label">EUR/USD</span><span class="metric-value">1.09</span></div>
            <div class="metric"><span class="metric-label">GDP增长（2026E）</span><span class="metric-value">1.2%</span></div>
            <div class="metric"><span class="metric-label">CPI</span><span class="metric-value">2.4%</span></div>
            <div class="metric"><span class="metric-label">失业率</span><span class="metric-value">7.2%</span></div>
            <div class="metric"><span class="metric-label">企业所得税</span><span class="metric-value">25%</span></div>
            <div class="metric"><span class="metric-label">VAT</span><span class="metric-value">20%</span></div>
            <div class="metric"><span class="metric-label">信用评级</span><span class="metric-value">AA</span></div>
        </div>
        <div class="section">
            <div class="section-title">🔬 科技投资</div>
            <p><strong>重点：</strong>航空（空客）、高铁、奢侈品、美妆、清洁能源、人工智能</p>
            <div class="metric"><span class="metric-label">研发占GDP</span><span class="metric-value">2.2%</span></div>
        </div>
        <div class="section">
            <div class="section-title">🚀 初创生态</div>
            <div class="metric"><span class="metric-label">初创企业</span><span class="metric-value">15,000+</span></div>
            <div class="metric"><span class="metric-label">独角兽</span><span class="metric-value">25+</span></div>
        </div>
        <div class="footer">
            <p>本报告由AI自动生成</p>
        </div>
    </div>
</body>
</html>
