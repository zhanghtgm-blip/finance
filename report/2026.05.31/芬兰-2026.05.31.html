<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芬兰财经周报 - 2026年5月31日</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; line-height: 1.8; color: #333; background: #f5f7fa; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #003085 0%, #FFFFFF 100%); color: #333; padding: 40px 0; text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.2em; margin-bottom: 10px; }
        .summary-box { background: linear-gradient(135deg, #e7f0ff 0%, #fff8f0 100%); border-left: 4px solid #003085; padding: 20px; margin-bottom: 30px; }
        .section { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .section-title { font-size: 1.4em; color: #003085; margin-bottom: 15px; }
        .metric { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .metric-label { color: #666; }
        .metric-value { font-weight: 700; }
        .footer { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🇫🇮 芬兰财经周报</h1>
            <p>2026年5月31日（第21周）</p>
        </div>
    </header>
    <div class="container">
        <div class="summary-box">
            <div class="summary-title">📊 周度总结</div>
            <p>芬兰是北欧创新之国，2026年GDP预计增长1.4%。赫尔辛基是科技中心，诺基亚故乡。在教育科技、绿色技术和游戏产业具有优势。</p>
        </div>
        <div class="section">

            <div class="metric"><span class="metric-label">EUR/USD</span><span class="metric-value">1.09</span></div>
            <div class="metric"><span class="metric-label">GDP增长（2026E）</span><span class="metric-value">1.4%</span></div>
            <div class="metric"><span class="metric-label">CPI</span><span class="metric-value">2.3%</span></div>
            <div class="metric"><span class="metric-label">失业率</span><span class="metric-value">6.5%</span></div>

            <div class="metric"><span class="metric-label">研发投入占GDP</span><span class="metric-value">2.8%</span></div>
        </div>
        <div class="section">
            <div class="section-title">🔬 科技投资环境</div>
            <p><strong>重点领域：</strong>教育科技、绿色能源、游戏产业（Supercell）、5G/6G技术</p>
            <p><strong>代表企业：</strong>Nokia, Supercell, Wolt,Metso</p>

        <div class="section">

            <div class="metric"><span class="metric-label">独角兽</span><span class="metric-value">8+</span></div>
        </div>
        <div class="footer">
            <p>本报告由AI自动生成</p>
        </div>
    </div>
