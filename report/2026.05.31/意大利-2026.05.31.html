<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意大利财经周报 - 2026年5月31日</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; line-height: 1.8; color: #333; background: #f5f7fa; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #009246 0%, #FFFFFF 100%); color: #333; padding: 40px 0; text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.2em; margin-bottom: 10px; }
        .summary-box { background: linear-gradient(135deg, #e7ffe7 0%, #fff 100%); border-left: 4px solid #009246; padding: 20px; margin-bottom: 30px; }
        .section { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .section-title { font-size: 1.4em; color: #009246; margin-bottom: 15px; }
        .metric { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .metric-label { color: #666; }
        .metric-value { font-weight: 700; }
        .footer { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🇮🇹 意大利财经周报</h1>
            <p>2026年5月31日（第21周）</p>
        </div>
    </header>
    <div class="container">
        <div class="summary-box">
            <div class="summary-title">📊 周度总结</div>
            <p>意大利是欧元区第三大经济体，2026年GDP预计增长1.0%。米兰是金融中心，都灵是汽车产区。奢侈品、时尚、汽车工业闻名。</p>
        </div>
        <div class="section">
            <div class="section-title">💰 财经基本面</div>
            <div class="metric"><span class="metric-label">EUR/USD</span><span class="metric-value">1.09</span></div>
            <div class="metric"><span class="metric-label">GDP增长（2026E）</span><span class="metric-value">1.0%</span></div>
            <div class="metric"><span class="metric-label">CPI</span><span class="metric-value">2.6%</span></div>
            <div class="metric"><span class="metric-label">失业率</span><span class="metric-value">7.8%</span></div>
            <div class="metric"><span class="metric-label">企业所得税</span><span class="metric-value">24%</span></div>
            <div class="metric"><span class="metric-label">VAT</span><span class="metric-value">22%</span></div>
        </div>
        <div class="section">
            <div class="section-title">🔬 科技投资</div>
            <p><strong>重点：</strong>奢侈品时尚、汽车制造（法拉利、兰博基尼亚）、机械人食品加工</p>
            <div class="metric"><span class="metric-label">研发占GDP</span><span class="metric-value">1.5%</span></div>
        </div>
        <div class="section">
            <div class="section-title">🚀 初创生态</div>
            <div class="metric"><span class="metric-label">独角兽</span><span class="metric-value">5</span></div>
        </div>
        <div class="footer">
            <p>本报告由AI自动生成</p>
        </div>
    </div>
</body>
</html>
